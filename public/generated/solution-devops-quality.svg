<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">GTG DevOps quality validation gate asset</title>
  <desc id="desc">A restrained validation gate made of nested graphite thresholds, measured lanes, and limited GTG red signal points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1800" y1="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090b0c"/>
      <stop offset="0.58" stop-color="#050607"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gate" x1="620" x2="1430" y1="190" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25292c"/>
      <stop offset="0.55" stop-color="#111315"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#e30613"/>
      <stop offset="1" stop-color="#8f0710"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="36" stdDeviation="34" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <g fill="none" stroke="#f3f1ea" stroke-linecap="square" opacity="0.07">
    <path d="M-80 262H1880M-80 432H1880M-80 602H1880M-80 772H1880"/>
    <path d="M534 -80L1418 1100M756 -80L1640 1100"/>
  </g>

  <g filter="url(#shadow)" fill="none" stroke-linejoin="miter">
    <path d="M634 804V374L836 210H1362V374H962V804Z" stroke="#f3f1ea" stroke-opacity="0.18" stroke-width="46"/>
    <path d="M770 740V430L902 322H1250V430H1016V740Z" stroke="#878a86" stroke-opacity="0.24" stroke-width="30"/>
    <path d="M900 678V488L976 426H1162V488H1050V678Z" stroke="#f3f1ea" stroke-opacity="0.28" stroke-width="18"/>
    <path d="M634 804V374L836 210H1362V374H962V804Z" stroke="#f3f1ea" stroke-opacity="0.1" stroke-width="2"/>
  </g>

  <g fill="none" stroke-linecap="square">
    <path d="M458 804H634M962 804H1458" stroke="#f3f1ea" stroke-opacity="0.26" stroke-width="5"/>
    <path d="M1016 430H1468" stroke="#f3f1ea" stroke-opacity="0.18" stroke-width="4"/>
    <path d="M900 678H1180L1268 590" stroke="#e30613" stroke-opacity="0.42" stroke-width="5"/>
    <path d="M468 590H900" stroke="#878a86" stroke-opacity="0.2" stroke-width="4"/>
  </g>

  <g fill="url(#red)">
    <rect x="884" y="662" width="32" height="32" rx="4" transform="rotate(45 900 678)" opacity="0.74"/>
    <rect x="1254" y="576" width="28" height="28" rx="4" transform="rotate(45 1268 590)" opacity="0.58"/>
    <path d="M1356 206H1488L1446 248H1314Z" opacity="0.62"/>
  </g>

  <g fill="#f3f1ea" opacity="0.1">
    <path d="M496 260H668L616 312H444Z"/>
    <path d="M1280 838H1438L1390 886H1232Z"/>
  </g>
</svg>
