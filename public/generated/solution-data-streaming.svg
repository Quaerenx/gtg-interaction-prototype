<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">GTG data streaming handoff asset</title>
  <desc id="desc">A segmented graphite signal corridor with beveled handoff modules and restrained GTG red activation edges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1800" y1="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0c0d"/>
      <stop offset="0.62" stop-color="#050607"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="module" x1="480" x2="1510" y1="300" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25292b"/>
      <stop offset="0.56" stop-color="#121517"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
