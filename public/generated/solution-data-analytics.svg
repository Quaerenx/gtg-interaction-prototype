<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">GTG data analytics operational layer asset</title>
  <desc id="desc">A restrained graphite field with folded analytical data plates, thin flow ribbons, and small GTG red activation points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1800" y1="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090b0c"/>
      <stop offset="0.58" stop-color="#050607"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="plate" x1="520" x2="1520" y1="220" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202427"/>
      <stop offset="0.55" stop-color="#111315"/>
      <stop offset="1" stop-color="#08090a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#e30613"/>
      <stop offset="1" stop-color="#8f0710"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="36" stdDeviation="36" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <g fill="none" stroke="#f3f1ea" stroke-linecap="square" opacity="0.08">
    <path d="M-80 860L620 106L1880 106"/>
    <path d="M-100 970L740 220L1880 220"/>
    <path d="M-120 1080L860 336L1880 336"/>
    <path d="M1120 -60L1840 662"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M642 706L1068 582L1494 720L1064 872Z" fill="#08090a" opacity="0.92"/>
    <path d="M594 606L1016 486L1442 620L1018 770Z" fill="url(#plate)" stroke="#f3f1ea" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M668 514L1034 406L1362 506L998 630Z" fill="#161a1c" stroke="#f3f1ea" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M756 428L1042 344L1288 420L1002 516Z" fill="#1d2022" stroke="#f3f1ea" stroke-opacity="0.2" stroke-width="2"/>
    <path d="M858 354L1046 298L1198 344L1010 410Z" fill="#24272a" stroke="#f3f1ea" stroke-opacity="0.2" stroke-width="2"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M520 740C702 700 818 642 962 584C1112 524 1222 508 1460 430" stroke="#f3f1ea" stroke-opacity="0.28" stroke-width="5"/>
    <path d="M612 808C790 766 900 718 1030 666C1188 604 1320 612 1512 558" stroke="#878a86" stroke-opacity="0.24" stroke-width="4"/>
    <path d="M760 464L956 536L1154 476L1354 538" stroke="#e30613" stroke-opacity="0.36" stroke-width="4"/>
  </g>

  <g transform="rotate(45)" fill="url(#red)">
    <rect x="772" y="-430" width="18" height="18" rx="2" opacity="0.82"/>
    <rect x="1006" y="-482" width="14" height="14" rx="2" opacity="0.66"/>
    <rect x="1164" y="-334" width="12" height="12" rx="2" opacity="0.48"/>
  </g>

  <g fill="#f3f1ea" opacity="0.12">
    <path d="M1410 242H1542L1500 284H1368Z"/>
    <path d="M1260 856H1388L1350 894H1222Z"/>
