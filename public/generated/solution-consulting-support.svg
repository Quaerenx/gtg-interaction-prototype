<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">GTG consulting support diagnostic route asset</title>
  <desc id="desc">A controlled diagnostic route made of folded graphite decision plates, calibration marks, and subtle red operating signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1800" y1="0" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090b0c"/>
      <stop offset="0.58" stop-color="#050607"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="plate" x1="520" x2="1540" y1="250" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24282a"/>
      <stop offset="0.56" stop-color="#111315"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#e30613"/>
      <stop offset="1" stop-color="#8f0710"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <g fill="none" stroke="#f3f1ea" stroke-linecap="square" opacity="0.07">
