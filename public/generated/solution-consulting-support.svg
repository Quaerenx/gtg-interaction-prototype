    <path d="M556 632L730 492H992L818 632Z" fill="url(#plate)"/>
    <path d="M826 430L1020 276H1306L1112 430Z" fill="url(#plate)"/>
    <path d="M1034 694L1224 548H1498L1308 694Z" fill="url(#plate)"/>
    <path d="M710 780L946 690H1182L948 842Z" fill="#0b0d0e" opacity="0.92"/>
  </g>

  <g fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M604 632H818L1020 276" stroke="#f3f1ea" stroke-opacity="0.28" stroke-width="5"/>
    <path d="M1112 430L1224 548L1450 548" stroke="#878a86" stroke-opacity="0.26" stroke-width="4"/>
    <path d="M818 632L946 690L1308 694" stroke="#f3f1ea" stroke-opacity="0.22" stroke-width="4"/>
    <path d="M730 492L902 530L1034 694" stroke="#e30613" stroke-opacity="0.38" stroke-width="4"/>
  </g>

