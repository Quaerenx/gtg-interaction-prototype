<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GTG data and analytics topology</title>
  <desc id="desc">Layered data grid with a query path, analytical node, and aggregation layer.</desc>
  <defs>
    <style>
      .bg{fill:#040404}.grid{stroke:#89867f;stroke-opacity:.22}.plane{fill:#181817;stroke:#f4efe4;stroke-opacity:.42;stroke-width:3}.line{fill:none;stroke:#f4efe4;stroke-opacity:.72;stroke-width:4}.soft{fill:none;stroke:#89867f;stroke-opacity:.46;stroke-width:3}.red{fill:none;stroke:#f02018;stroke-width:6}.node{fill:#181817;stroke:#f4efe4;stroke-opacity:.76;stroke-width:4}.active{fill:#181817;stroke:#f02018;stroke-width:6}.label{fill:#f4efe4;font:700 24px Arial,sans-serif}.small{fill:#89867f;font:700 18px Arial,sans-serif}
    </style>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse"><path d="M72 0H0V72" class="grid"/></pattern>
  </defs>
  <rect width="1440" height="900" class="bg"/>
  <rect x="64" y="64" width="1312" height="772" fill="url(#grid)"/>
