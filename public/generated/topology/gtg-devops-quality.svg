<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GTG DevOps and quality topology</title>
  <desc id="desc">Release confidence matrix with quality gate, test traceability, and validation path.</desc>
  <defs>
