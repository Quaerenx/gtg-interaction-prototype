<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">GTG capability map</title>
  <desc id="desc">Five GTG service capabilities connected as a technical delivery system without implying a fixed linear process.</desc>
  <style>
    .bg{fill:#040404}.grid{stroke:#89867f;stroke-opacity:.18}.frame{fill:#10100f;stroke:#f4efe4;stroke-opacity:.16;stroke-width:2}.zone{fill:#181817;stroke:#f4efe4;stroke-opacity:.38;stroke-width:3}.node{fill:#181817;stroke:#f4efe4;stroke-opacity:.72;stroke-width:4}.edge{fill:none;stroke:#f4efe4;stroke-opacity:.62;stroke-width:4}.muted{fill:none;stroke:#89867f;stroke-opacity:.42;stroke-width:3;stroke-dasharray:14 14}.active{fill:#181817;stroke:#f02018;stroke-width:6}.red{fill:none;stroke:#f02018;stroke-width:6}.label{fill:#f4efe4;font:700 26px Arial,sans-serif}.small{fill:#89867f;font:700 18px Arial,sans-serif}.tag{fill:#f4efe4;font:700 14px Arial,sans-serif;letter-spacing:.04em}
  </style>
  <rect class="bg" width="1440" height="810"/>
  <path class="grid" d="M120 110H1320M120 220H1320M120 330H1320M120 440H1320M120 550H1320M120 660H1320M180 80V730M340 80V730M500 80V730M660 80V730M820 80V730M980 80V730M1140 80V730M1300 80V730"/>
  <rect class="frame" x="74" y="58" width="1292" height="694"/>
  <text x="112" y="126" class="tag">GTG CAPABILITY MAP</text>
  <text x="112" y="154" class="small">Data, platform, quality, and support capabilities connected as one service relationship field</text>

  <path class="edge" d="M720 250V560"/>
  <path class="edge" d="M444 300C560 300 606 250 720 250S882 300 996 300"/>
  <path class="edge" d="M444 512C560 512 606 560 720 560S882 512 996 512"/>
  <path class="muted" d="M444 300C526 392 526 420 444 512"/>
  <path class="muted" d="M996 300C914 392 914 420 996 512"/>
  <path class="red" d="M680 404H760"/>
  <path d="M752 380L802 404L752 428Z" fill="#f02018"/>
  <path d="M1194 108H1300L1268 144H1162Z" fill="#f02018"/>

  <g transform="translate(252 240)">
