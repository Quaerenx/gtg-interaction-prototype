  <path d="M300 600L520 470L760 600L980 470L1160 600" class="mesh"/>
  <path d="M300 300V600M520 230V470M760 300V600M980 230V470M1160 330V600" class="mesh"/>
  <path d="M232 450H380C490 450 496 318 618 318H838C958 318 964 450 1088 450H1220" class="line"/>
  <path d="M232 450H380C494 450 504 518 620 518H842C960 518 974 450 1088 450" class="red"/>
  <circle cx="300" cy="300" r="28" class="node"/>
  <circle cx="520" cy="230" r="28" class="node"/>
  <circle cx="760" cy="300" r="34" class="active"/>
  <circle cx="980" cy="230" r="28" class="node"/>
  <circle cx="1160" cy="330" r="28" class="node"/>
  <circle cx="300" cy="600" r="28" class="node"/>
  <circle cx="760" cy="600" r="28" class="node"/>
  <circle cx="1160" cy="600" r="28" class="node"/>
  <path d="M1044 192H1134L1108 222H1018Z" fill="#f02018"/>
  <path d="M1134 192L1170 208L1144 238L1108 222Z" fill="#9e0d0a"/>
