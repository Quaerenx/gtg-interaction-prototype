<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GTG infrastructure automation topology</title>
  <desc id="desc">Provisioning mesh with structured nodes, policy path, and repeatable platform route.</desc>
  <defs>
    <style>
      .bg{fill:#040404}.grid{stroke:#89867f;stroke-opacity:.2}.mesh{fill:none;stroke:#89867f;stroke-opacity:.42;stroke-width:3}.line{fill:none;stroke:#f4efe4;stroke-opacity:.7;stroke-width:4}.red{fill:none;stroke:#f02018;stroke-width:6}.node{fill:#181817;stroke:#f4efe4;stroke-opacity:.72;stroke-width:4}.active{fill:#181817;stroke:#f02018;stroke-width:6}.label{fill:#f4efe4;font:700 24px Arial,sans-serif}.small{fill:#89867f;font:700 18px Arial,sans-serif}
    </style>
    <pattern id="grid" width="76" height="76" patternUnits="userSpaceOnUse"><path d="M76 0H0V76" class="grid"/></pattern>
  </defs>
