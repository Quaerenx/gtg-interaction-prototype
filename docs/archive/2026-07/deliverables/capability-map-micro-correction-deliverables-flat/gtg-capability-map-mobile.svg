<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 760" role="img" aria-labelledby="title desc">
  <title id="title">GTG mobile capability map</title>
  <desc id="desc">A stacked relationship view of five GTG capabilities with semantic labels kept outside the visual in HTML.</desc>
  <style>
    .bg{fill:#040404}.grid{stroke:#89867f;stroke-opacity:.16}.frame{fill:#10100f;stroke:#f4efe4;stroke-opacity:.16;stroke-width:2}.node{fill:#181817;stroke:#f4efe4;stroke-opacity:.72;stroke-width:3}.active{fill:#181817;stroke:#f02018;stroke-width:5}.edge{fill:none;stroke:#f4efe4;stroke-opacity:.58;stroke-width:3}.red{fill:none;stroke:#f02018;stroke-width:5}.label{fill:#f4efe4;font:700 17px Arial,sans-serif}.small{fill:#89867f;font:700 12px Arial,sans-serif}.tag{fill:#f4efe4;font:700 11px Arial,sans-serif;letter-spacing:.04em}
  </style>
  <rect class="bg" width="390" height="760"/>
  <path class="grid" d="M34 70H356M34 150H356M34 230H356M34 310H356M34 390H356M34 470H356M34 550H356M34 630H356M72 42V708M150 42V708M228 42V708M306 42V708"/>
  <rect class="frame" x="24" y="28" width="342" height="704"/>
